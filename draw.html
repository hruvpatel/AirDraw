<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Air Draw</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body {
            margin: 0;
            background: #0f0f0f;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #controls {
            position: absolute;
            top: 20px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            display: flex;
            gap: 20px;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .canvas-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* Mirror the video and drawing for natural feel */
        canvas, video {
            position: absolute;
            top: 0;
            left: 0;
            transform: scaleX(-1); 
        }

        #video_input {
            opacity: 0.2; /* Faded background video */
            object-fit: cover;
            width: 100%;
            height: 100%;
        }

        #draw_canvas {
            width: 100%;
            height: 100%;
        }

        input[type="color"] {
            border: none;
            width: 30px;
            height: 30px;
            cursor: pointer;
            background: none;
        }

        label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="controls">
        <div style="display: flex; align-items: center; gap: 8px;">
            <label>Color</label>
            <input type="color" id="colorPicker" value="#00f2ff">
        </div>
        <div style="display: flex; align-items: center; gap: 8px;">
            <label>Thickness</label>
            <input type="range" id="sizeSlider" min="2" max="20" value="5">
        </div>
        <div id="status" style="color: #00f2ff; font-weight: bold; min-width: 100px; text-align: center;">
            Detecting...
        </div>
    </div>

    <div class="canvas-container">
        <video id="video_input"></video>
        <canvas id="draw_canvas"></canvas>
    </div>

    <script>
        const videoElement = document.getElementById('video_input');
        const canvasElement = document.getElementById('draw_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const sizeSlider = document.getElementById('sizeSlider');
        const statusDiv = document.getElementById('status');

        let lastX = 0;
        let lastY = 0;
        let isDrawing = false;

        // Resize canvas to window
        function resize() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function onResults(results) {
            canvasCtx.save();
            
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                // Landmark IDs: Index Tip (8), Index Base (5), Thumb Tip (4), Pinky Tip (20)
                const indexTip = landmarks[8];
                const thumbTip = landmarks[4];
                const pinkyTip = landmarks[20];
                const middleTip = landmarks[12];

                const x = indexTip.x * canvasElement.width;
                const y = indexTip.y * canvasElement.height;

                // --- GESTURE LOGIC ---
                
                // 1. Erase: Open Palm (Index and Pinky both high)
                if (indexTip.y < landmarks[6].y && pinkyTip.y < landmarks[18].y && middleTip.y < landmarks[10].y) {
                    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
                    statusDiv.innerText = "ERASING";
                    statusDiv.style.color = "#ff4d4d";
                    isDrawing = false;
                } 
                // 2. Pause: Fist (Index tip below its base)
                else if (indexTip.y > landmarks[6].y) {
                    statusDiv.innerText = "PAUSED";
                    statusDiv.style.color = "#ffcc00";
                    isDrawing = false;
                } 
                // 3. Draw: Index Up
                else {
                    statusDiv.innerText = "DRAWING";
                    statusDiv.style.color = colorPicker.value;
                    
                    if (isDrawing) {
                        drawNeonLine(lastX, lastY, x, y);
                    }
                    isDrawing = true;
                }

                lastX = x;
                lastY = y;
            } else {
                isDrawing = false;
                statusDiv.innerText = "HAND NOT FOUND";
            }
            canvasCtx.restore();
        }

        function drawNeonLine(x1, y1, x2, y2) {
            const color = colorPicker.value;
            const size = sizeSlider.value;

            // Blur for Neon Effect
            canvasCtx.shadowBlur = 15;
            canvasCtx.shadowColor = color;
            canvasCtx.strokeStyle = color;
            canvasCtx.lineWidth = size;
            canvasCtx.lineCap = "round";
            canvasCtx.lineJoin = "round";

            canvasCtx.beginPath();
            canvasCtx.moveTo(x1, y1);
            canvasCtx.lineTo(x2, y2);
            canvasCtx.stroke();
            
            // Core White Line (makes it pop)
            canvasCtx.shadowBlur = 0;
            canvasCtx.strokeStyle = "white";
            canvasCtx.lineWidth = size / 3;
            canvasCtx.stroke();
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 1280,
            height: 720
        });
        camera.start();
    </script>
</body>
</html>
